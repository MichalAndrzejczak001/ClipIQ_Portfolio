name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:

  backend:
    name: Backend (Spring Boot)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('backend/**/*.gradle.kts', 'backend/**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Run JUnit5 tests
        run: ./gradlew test --no-daemon
        working-directory: backend

      - name: Run TestNG tests
        run: ./gradlew testNG --no-daemon
        working-directory: backend

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: allure-results-backend
          path: backend/build/allure-results

  ai-service:
    name: AI Service (FastAPI)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-${{ hashFiles('ai_service/requirements*.txt') }}
          restore-keys: pip-

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt
        working-directory: ai_service

      - name: Run tests
        run: pytest tests/ -v
        working-directory: ai_service

  frontend:
    name: Frontend (React)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: frontend

      - name: Build
        run: npm run build
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

  selenium:
    name: Selenium E2E
    runs-on: ubuntu-latest
    needs: [backend, ai-service]
    steps:
      - uses: actions/checkout@v4

      - name: Check if selenium tests exist
        id: check
        run: |
          if [ -f selenium_tests/requirements.txt ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - uses: actions/setup-python@v5
        if: steps.check.outputs.exists == 'true'
        with:
          python-version: '3.11'

      - uses: actions/cache@v4
        if: steps.check.outputs.exists == 'true'
        with:
          path: ~/.cache/pip
          key: pip-selenium-${{ hashFiles('selenium_tests/requirements.txt') }}
          restore-keys: pip-selenium-

      - name: Install Chrome
        if: steps.check.outputs.exists == 'true'
        run: sudo apt-get update && sudo apt-get install -y google-chrome-stable

      - name: Install dependencies
        if: steps.check.outputs.exists == 'true'
        run: pip install -r requirements.txt
        working-directory: selenium_tests

      - name: Run Selenium tests
        if: steps.check.outputs.exists == 'true'
        run: pytest tests/ -v --alluredir=allure-results
        working-directory: selenium_tests

      - uses: actions/upload-artifact@v4
        if: steps.check.outputs.exists == 'true'
        with:
          name: allure-results-selenium
          path: selenium_tests/allure-results
